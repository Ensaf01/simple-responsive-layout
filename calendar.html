<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calender with flex and grid</title>
<style>
    .calendar {
        display: grid;
        grid-template-columns: repeat(7,1fr);
        /* gap: 10px; */
        column-gap: 8px;
        row-gap: 8px;
        /* width: 400px;
        margin: 0 auto; */
        border: 2px solid rgb(233, 13, 13);
        padding: 10px;
    }
    .date, .day{
        /* border: 2px solid black; */
        background-color: rgb(116, 180, 235);
        border-radius: 4px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* font-size: large; */
        font-size: 1.5em;

    }
    .date-vacation{
        background-color: rgb(231, 104, 104);
    }
    .friday{
        background-color: rgb(216, 166, 131);
    }
    .day{
        background-color: aquamarine;
        font-size: 1em;
    }

    
</style>
</head>
<body>
    <h1>Calendar(use flex and grid)</h1>
    <div class="calendar">
        <div class="day">Sun</div>
        <div class="day">Mon</div>
        <div class="day">Tu</div>
        <div class="day">Wen</div>
        <div class="day">Th</div>
        <div class="day">Fri</div>
        <div class="day">Sat</div>
        <!-- .date{$}*35 -->
         <div class="date">29</div>
         <div class="date">30</div>
         <div class="date">31</div>
        <div class="date">1</div>
        <div class="date">2</div>
        <div class="date friday">3</div>
        <div class="date">4</div>
        <div class="date date-vacation">5</div>
        <div class="date">6</div>
        <div class="date">7</div>
        <div class="date">8</div>
        <div class="date">9</div>
        <div class="date friday">10</div>
        <div class="date">11</div>
        <div class="date">12</div>
        <div class="date">13</div>
        <div class="date">14</div>
        <div class="date date-vacation">15</div>
        <div class="date">16</div>
        <div class="date friday">17</div>
        <div class="date">18</div>
        <div class="date">19</div>
        <div class="date">20</div>
        <div class="date">21</div>
        <div class="date">22</div>
        <div class="date">23</div>
        <div class="date friday">24</div>
        <div class="date">25</div>
        <div class="date">26</div>
        <div class="date">27</div>
        <div class="date">28</div>
        <div class="date">29</div>
        <div class="date">30</div>
        <div class="date friday">1</div>
        <div class="date">2</div>
    </div>
</body>
</html>
